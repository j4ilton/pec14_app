name: pec14_app
description: A new Flutter project.
publish_to: none

version: 2.1.5+14

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/app_icon.png
  web:
    generate: true
    image_path: assets/icons/app_icon.png
    background_color: "#FFFFFF"
    theme_color: "#1E7C4C"
  windows:
    generate: true
    image_path: assets/icons/app_icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/icons/app_icon.png

flutter:
  uses-material-design: true
